<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,
      minimum-scale=1.0, maximum-scale=1.0, user-scalable=no,
      viewport-fit=cover, interactive-widget=resizes-content">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050508">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EVOLVE">
<meta name="description" content="EVOLVE: Shadow Run — adaptive mobile platformer">
<meta name="format-detection" content="telephone=no">
<title>EVOLVE: Shadow Run</title>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #06060e;
    font-family: 'Courier New', monospace;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    overscroll-behavior: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    padding-top:    env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left:   env(safe-area-inset-left);
    padding-right:  env(safe-area-inset-right);
  }

  /* Atmospheric canvas behind everything */
  #menuBg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* Screen content sits above canvas */
  #screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 2;
  }
  #screen > * { position: relative; z-index: 2; }

  /* Title */
  .menu-title-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-bottom: 4px;
  }
  .menu-eyebrow {
    font-size: 10px;
    letter-spacing: 5px;
    color: rgba(0,212,255,0.45);
    text-transform: uppercase;
  }
  .menu-title {
    font-size: clamp(38px, 9vw, 64px);
    letter-spacing: 14px;
    font-weight: 400;
    color: #e8f4ff;
    text-shadow:
      0 0 6px  rgba(0,212,255,0.9),
      0 0 22px rgba(0,212,255,0.55),
      0 0 60px rgba(0,212,255,0.25),
      0 2px 0  rgba(0,0,0,0.8);
    line-height: 1;
    position: relative;
  }
  .menu-title::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    height: 1px;
    background: linear-gradient(90deg, transparent, #00d4ff, transparent);
    animation: titleLine 3s ease-in-out infinite;
  }
  @keyframes titleLine {
    0%, 100% { width: 20%; opacity: 0.3; }
    50%       { width: 80%; opacity: 0.8; }
  }
  .menu-sub {
    font-size: 11px;
    letter-spacing: 6px;
    color: rgba(0,212,255,0.5);
    margin-top: 10px;
  }

  /* Lore */
  .menu-lore {
    font-size: 12px;
    color: #556680;
    letter-spacing: 1px;
    text-align: center;
    line-height: 2;
    max-width: 380px;
    padding: 0 20px;
  }

  /* Stats */
  .stat-row {
    display: flex;
    gap: 28px;
    font-size: 11px;
    color: #334455;
    letter-spacing: 2px;
  }
  .stat-row span { color: #4488aa; }

  /* Start button */
  #startBtn {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 5px;
    padding: 13px 44px;
    background: transparent;
    border: 1px solid rgba(0,212,255,0.5);
    color: #00d4ff;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.25s, box-shadow 0.25s, letter-spacing 0.25s, border-color 0.25s;
    -webkit-tap-highlight-color: transparent;
  }
  #startBtn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(0,212,255,0.07) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  #startBtn:hover {
    background: rgba(0,212,255,0.08);
    box-shadow: 0 0 28px rgba(0,212,255,0.22), inset 0 0 16px rgba(0,212,255,0.05);
    letter-spacing: 6px;
    border-color: rgba(0,212,255,0.8);
  }
  #startBtn:hover::before { transform: translateX(100%); }
  #startBtn:active { transform: scale(0.97); }

  /* Hints */
  .menu-hints {
    font-size: 9px;
    color: #334;
    letter-spacing: 1.5px;
    opacity: 0.5;
    text-align: center;
    padding: 0 16px;
  }

  /* Fade overlay */
  #menuFade {
    position: fixed;
    inset: 0;
    background: #06060e;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.55s ease;
  }
  #menuFade.fade-active {
    opacity: 1;
    pointer-events: all;
  }
</style>
</head>
<body>

<!-- Atmospheric background -->
<canvas id="menuBg"></canvas>

<!-- Home screen -->
<div id="screen">

  <div class="menu-title-wrap">
    <div class="menu-eyebrow">// adaptive platformer //</div>
    <div class="menu-title">EVOLVE</div>
    <div class="menu-sub">S H A D O W &nbsp; R U N</div>
  </div>

  <p class="menu-lore">Your past runs return as ghosts.<br>Survive them. Outlast yourself.</p>

  <div class="stat-row">
    <div>BEST &nbsp;<span id="statBest">0</span></div>
    <div>RUNS &nbsp;<span id="statRuns">0</span></div>
  </div>

  <button id="startBtn">[ BEGIN ]</button>

  <p class="menu-hints">
    WASD / ARROWS &nbsp;·&nbsp; SPACE jump &nbsp;·&nbsp; SHIFT dash (lv4+)
  </p>

</div>

<!-- Fade-to-black overlay -->
<div id="menuFade"></div>

<script>
'use strict';

// ── Load saved stats ─────────────────────────────────────────────────────
document.getElementById('statBest').textContent = localStorage.getItem('sr_best') || '0';
document.getElementById('statRuns').textContent = localStorage.getItem('sr_runs') || '0';

// ── Atmospheric background animation ─────────────────────────────────────
(function initMenuBg() {
  const mc   = document.getElementById('menuBg');
  const mCtx = mc.getContext('2d');
  let mTime  = 0;

  const pts = Array.from({length: 55}, () => ({
    x:     Math.random(),
    y:     Math.random(),
    r:     0.4 + Math.random() * 1.4,
    spd:   0.00012 + Math.random() * 0.00018,
    drift: (Math.random() - 0.5) * 0.00008,
    phase: Math.random() * Math.PI * 2,
    pulse: 1.5 + Math.random() * 3,
    col:   Math.random() < 0.15 ? '#6644ff' : '#00d4ff',
  }));

  function resize() {
    mc.width  = window.innerWidth;
    mc.height = window.innerHeight;
  }

  function draw() {
    const W = mc.width, H = mc.height;
    mTime += 0.016;

    // Dark base
    mCtx.fillStyle = '#06060e';
    mCtx.fillRect(0, 0, W, H);

    // Fog layers
    for (let lay = 0; lay < 2; lay++) {
      const dir   = lay === 0 ? 1 : -1;
      const shift = ((mTime * 18 * dir) % (W * 1.5));
      const grad  = mCtx.createLinearGradient(0, H * 0.35, 0, H);
      grad.addColorStop(0,   'transparent');
      grad.addColorStop(0.4, `rgba(${lay===0?'4,12,30':'8,4,22'},${0.18 + lay*0.06})`);
      grad.addColorStop(1,   `rgba(${lay===0?'2,8,20':'6,2,18'},0.28)`);
      mCtx.save();
      mCtx.translate(shift - W * 0.5 * lay, 0);
      mCtx.fillStyle = grad;
      mCtx.beginPath();
      for (let x = -W; x <= W * 2; x += 40) {
        const wave = Math.sin(x * 0.003 + mTime * 0.4 + lay) * 22
                   + Math.sin(x * 0.007 - mTime * 0.3) * 12;
        if (x === -W) mCtx.moveTo(x, H * 0.58 + wave);
        else          mCtx.lineTo(x, H * 0.58 + wave);
      }
      mCtx.lineTo(W * 2, H); mCtx.lineTo(-W, H); mCtx.closePath();
      mCtx.fill();
      mCtx.restore();
    }

    // Arch glow
    const ag = mCtx.createRadialGradient(W*0.5, H*0.28, 0, W*0.5, H*0.28, W*0.38);
    ag.addColorStop(0,   'rgba(0,180,255,0.04)');
    ag.addColorStop(0.5, 'rgba(0,80,160,0.03)');
    ag.addColorStop(1,   'transparent');
    mCtx.fillStyle = ag;
    mCtx.fillRect(0, 0, W, H);

    // Floating particles
    for (const pt of pts) {
      pt.y -= pt.spd;
      pt.x += pt.drift;
      if (pt.y < -0.02) { pt.y = 1.02; pt.x = Math.random(); }
      if (pt.x < -0.02 || pt.x > 1.02) pt.x = Math.random();

      const alpha = 0.3 + 0.5 * Math.abs(Math.sin(mTime * pt.pulse + pt.phase));
      mCtx.globalAlpha = alpha * 0.75;

      const sg = mCtx.createRadialGradient(pt.x*W, pt.y*H, 0, pt.x*W, pt.y*H, pt.r*4);
      sg.addColorStop(0, pt.col === '#6644ff' ? 'rgba(80,40,255,0.3)' : 'rgba(0,212,255,0.4)');
      sg.addColorStop(1, 'transparent');
      mCtx.fillStyle = sg;
      mCtx.beginPath(); mCtx.arc(pt.x*W, pt.y*H, pt.r*5, 0, Math.PI*2); mCtx.fill();

      mCtx.fillStyle = pt.col;
      mCtx.beginPath(); mCtx.arc(pt.x*W, pt.y*H, pt.r, 0, Math.PI*2); mCtx.fill();
    }
    mCtx.globalAlpha = 1;

    // Scanlines
    mCtx.fillStyle = 'rgba(0,0,0,0.06)';
    for (let y = 0; y < H; y += 3) mCtx.fillRect(0, y, W, 1);

    requestAnimationFrame(draw);
  }

  resize();
  window.addEventListener('resize', resize);
  draw();
})();

// ── Atmospheric menu music ───────────────────────────────────────────────
let audioCtx = null;
let menuMusicNodes = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function startMenuMusic() {
  if (!audioCtx || menuMusicNodes) return;
  const ctx   = audioCtx;
  const nodes = [];

  function pad(freq, vol, detune) {
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    const rev = ctx.createConvolver();
    const len = ctx.sampleRate * 2.4;
    const buf = ctx.createBuffer(2, len, ctx.sampleRate);
    for (let c = 0; c < 2; c++) {
      const d = buf.getChannelData(c);
      for (let i = 0; i < len; i++)
        d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.2);
    }
    rev.buffer = buf;
    osc.type = 'sine'; osc.frequency.value = freq;
    if (detune) osc.detune.value = detune;
    g.gain.value = 0;
    osc.connect(g); g.connect(rev); rev.connect(ctx.destination);
    const dry = ctx.createGain(); dry.gain.value = vol * 0.25;
    osc.connect(dry); dry.connect(ctx.destination);
    osc.start();
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + 3.5);
    nodes.push(osc, g, dry, rev);
  }

  const root = 73.4;
  pad(root,        0.055,  0);
  pad(root * 1.5,  0.028,  3);
  pad(root * 2,    0.018, -4);
  pad(root * 2.67, 0.012,  7);
  pad(root * 0.5,  0.04,   0);

  const tremOsc = ctx.createOscillator(), tremGain = ctx.createGain();
  const padOsc  = ctx.createOscillator(), padGain  = ctx.createGain();
  tremOsc.frequency.value = 0.18; tremOsc.type = 'sine'; tremGain.gain.value = 0.012;
  padOsc.frequency.value = root * 3; padOsc.type = 'sine'; padGain.gain.value = 0;
  tremOsc.connect(tremGain); tremGain.connect(padGain.gain);
  padOsc.connect(padGain); padGain.connect(ctx.destination);
  tremOsc.start(); padOsc.start();
  padGain.gain.setValueAtTime(0, ctx.currentTime);
  padGain.gain.linearRampToValueAtTime(0.018, ctx.currentTime + 5);
  nodes.push(tremOsc, tremGain, padOsc, padGain);
  menuMusicNodes = nodes;
}

// ── Fullscreen ───────────────────────────────────────────────────────────
function requestFullscreen() {
  const el  = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen
           || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (req) req.call(el, { navigationUI: 'hide' }).catch(() => {});
  if (screen.orientation && screen.orientation.lock)
    screen.orientation.lock('landscape').catch(() => {});
}

// ── Navigate to game ─────────────────────────────────────────────────────
const menuFadeEl = document.getElementById('menuFade');

function goToGame() {
  requestFullscreen();
  menuFadeEl.classList.add('fade-active');
  menuFadeEl.addEventListener('transitionend', () => {
    window.location.href = 'game.html';
  }, { once: true });
}

// ── Button & keyboard ────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => {
  initAudio();
  startMenuMusic();
  setTimeout(goToGame, 120);
});

document.addEventListener('keydown', e => {
  if (e.code === 'Enter' || e.code === 'NumpadEnter')
    document.getElementById('startBtn').click();
});
</script>
</body>
</html>
