<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EVOLVE: Shadow Run</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #050508;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  /* Outer wrapper — sized & scaled by JS to fit viewport at 16:10 */
  #gameWrapper {
    position: relative;
    width: 800px;
    height: 500px;
    flex-shrink: 0;
    transform-origin: center center;
  }

  /* Inner container holds canvas + all HTML overlays */
  #gameContainer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    border: 1px solid #1a1a2e;
    box-shadow: 0 0 60px rgba(0,200,255,0.07);
    background: #08080f;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ── UI Screens ── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(6,6,14,0.96);
    color: #e0e0ff;
    z-index: 10;
    gap: 15px;
  }
  .screen.hidden { display: none; }
  .screen h1 {
    font-size: 40px;
    letter-spacing: 8px;
    color: #00d4ff;
    text-shadow: 0 0 24px rgba(0,212,255,0.35);
    font-weight: 400;
  }
  .screen h2 {
    font-size: 22px;
    letter-spacing: 5px;
    color: #ff4466;
    font-weight: 400;
  }
  .screen p {
    font-size: 13px;
    color: #8888aa;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.9;
    max-width: 460px;
    padding: 0 16px;
  }
  .screen .subtitle {
    font-size: 11px;
    color: #00d4ff;
    letter-spacing: 3px;
    opacity: 0.65;
  }

  .btn {
    padding: 11px 34px;
    background: transparent;
    border: 1px solid #00d4ff;
    color: #00d4ff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover  { background: rgba(0,212,255,0.1); box-shadow: 0 0 18px rgba(0,212,255,0.18); }
  .btn:active { transform: scale(0.97); }

  .stat-row {
    display: flex;
    gap: 36px;
    font-size: 13px;
    color: #556;
    letter-spacing: 1px;
  }
  .stat-row span { color: #00d4ff; }

  /* ── HUD ── */
  #hud {
    position: absolute;
    top: 10px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 16px;
    pointer-events: none;
    z-index: 5;
    font-size: 12px;
    letter-spacing: 2px;
    color: #8888aa;
  }
  #hud .hud-val        { color: #00d4ff; }
  #hud .hud-val.danger { color: #ff4466; }

  /* ── Level transition overlay (JS controls opacity directly) ── */
  #levelOverlay {
    position: absolute;
    inset: 0;
    background: #06060e;
    opacity: 0;
    pointer-events: none;
    z-index: 8;
  }

  /* ── Level announcement banner ── */
  #levelBanner {
    position: absolute;
    top: 46%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #00d4ff;
    font-size: 28px;
    letter-spacing: 7px;
    font-weight: 400;
    pointer-events: none;
    z-index: 9;
    opacity: 0;
    text-shadow: 0 0 22px rgba(0,212,255,0.55);
    white-space: nowrap;
    transition: opacity 0.25s;
  }

  /* ── Touch controls ── */
  #touchControls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: none;
    padding: 8px 14px 12px;
    justify-content: space-between;
    align-items: flex-end;
    z-index: 7;
    pointer-events: none;
  }
  .touch-group { display: flex; gap: 10px; pointer-events: all; }
  .touch-btn {
    width: 60px; height: 60px;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.28);
    border-radius: 10px;
    color: #00d4ff;
    font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .touch-btn.pressed { background: rgba(0,212,255,0.22); border-color: rgba(0,212,255,0.6); }
  #tDash { font-size: 13px; letter-spacing: 1px; }
</style>
</head>

// ════════════════════════════════════════════════════════════════════════
//  EVOLVE: SHADOW RUN  — v2 (fixed & improved)
//  Key fixes:
//    • Goal check uses world-space p.x directly (was subtracting camX — wrong)
//    • startLevel() fully reinitialises ALL state — no leaks between levels
//    • Level transition: fade-out → swap → fade-in using per-frame JS alpha
//    • Responsive: CSS transform scales 800×500 canvas to fit any viewport
//    • Touch controls: proper multi-touch via touchstart/touchend per button
// ════════════════════════════════════════════════════════════════════════

// ── Responsive scaling ────────────────────────────────────────────────
const GAME_W = 800, GAME_H = 500;
const wrapper = document.getElementById('gameWrapper');

function resizeGame() {
  const scale = Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H);
  wrapper.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', resizeGame);
window.addEventListener('orientationchange', () => setTimeout(resizeGame, 250));
resizeGame();

// Show touch controls if touch-capable
function checkTouchDevice() {
  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
    document.getElementById('touchControls').style.display = 'flex';
  }
}
checkTouchDevice();

// ── Audio ─────────────────────────────────────────────────────────────
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playTone(freq, type, dur, vol, decay) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + decay);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

const sfxJump  = () => playTone(280,'triangle',0.18,0.3,0.15);
const sfxDash  = () => { playTone(600,'sawtooth',0.12,0.2,0.1); playTone(900,'sawtooth',0.12,0.15,0.08); };

// ── Physics ───────────────────────────────────────────────────────────

// ── Player ────────────────────────────────────────────────────────────

function resetPlayer() {
  p = {

// ── Ghost system ───────────────────────────────────────────────────────
const MAX_REC = 3600;
let currentRec = [];
let ghosts     = [];

function maxGhosts(lv) {
  if (lv <= 2) return 0;
  if (lv <= 5) return 1;
  if (lv <= 8) return 2;
  return 3;
}

function initGhosts() {
  ghosts = [];
  const n    = maxGhosts(level);
  const pool = ghostSaves.slice(-6);
  for (let i = 0; i < Math.min(n, pool.length); i++) {
    ghosts.push({
      frames:   pool[pool.length - 1 - i],
      frameIdx: 0,
      x:80, y:380,
      alpha: 0.35 + i * 0.05
    });
  }
}

function saveGhost() {
  if (currentRec.length < 30) return;
  ghostSaves.push(currentRec);
  if (ghostSaves.length > 6) ghostSaves.shift();
  localStorage.setItem('sr_ghosts', JSON.stringify(ghostSaves));
}

// ── Camera ────────────────────────────────────────────────────────────
let camX = 0, targetCamX = 0;

// ── Level data & particles ─────────────────────────────────────────────

let particles = [];

// ════════════════════════════════════════════════════════════════════════
//  LEVEL DEFINITIONS
// ════════════════════════════════════════════════════════════════════════

function ground() {
  return { x:0, y:440, w:99999, h:60, type:'solid' };
}

function spikes(x0, x1, gap, y) {
  const arr = [];
  for (let x = x0; x < x1; x += gap) arr.push({x,y,w:18,h:12,type:'spike'});
  return arr;
}

// Helper: moving obstacle / platform object
function mov(x, y, w, h, vx, range, isObstacle) {
  return { x, y, w, h, type:'moving', vx, range, ox:x, oy:y, t:0,
           _isOb: isObstacle||false };
}

// Levels 6–10: procedural
for (let lv = 6; lv <= 10; lv++) {
  DEFS[lv] = ((l) => () => procLevel(l))(lv);
}

function procLevel(lv) {
  const d     = Math.min((lv - 5) * diffMod, 4);
  const width = 2400 + lv * 200;
  const platforms = [ground()];
  const obstacles = [];

  let px = 200, py = 370;
  while (px < width - 300) {
    const pw   = 75 + Math.random() * 55;
    const kind = Math.random() < 0.18 ? 'safe' : (Math.random() < 0.28 ? 'moving' : 'solid');
    platforms.push({
      x:px, y:py, w:pw, h:16, type:kind,
      vx:1 + Math.random() * d * 0.55,
      range:55 + Math.random() * 65,
      ox:px, oy:py, t:0
    });
    px += pw + 80 + Math.random() * 70;
    py  = 210 + Math.random() * 200;
  }

  const gap = Math.max(110, 195 - lv * 7);
  for (let x = 300; x < width - 200; x += gap + Math.random() * 50) {
    const near = deathLocs.some(dx => Math.abs(dx - x) < 75);
    if (near && Math.random() < 0.45) continue;
    obstacles.push({x, y:428, w:18, h:12, type:'spike'});
  }

  const nm = 2 + Math.floor(d);
  for (let i = 0; i < nm; i++) {
    const mx = 400 + Math.floor(Math.random() * (width - 600));
    obstacles.push({
      x:mx, y:390+(Math.random()*18|0), w:30, h:30,
      type:'moving', vx:1.4+Math.random()*d*0.45,
      range:80+Math.random()*80, ox:mx, t:0
    });
  }

  return { width, goalX:width-120, platforms, obstacles };
}

// ════════════════════════════════════════════════════════════════════════
//  LEVEL INIT — single authoritative function, resets all state
// ════════════════════════════════════════════════════════════════════════
function startLevel(lv) {
  // Scalars
  level        = lv;
  dashUnlocked = lv >= 4;
  levelTimer   = 0;
  frameCount   = 0;
  invincTimer  = 0;
  dashCooldown = 0;
  shakeTimer   = 0;
  flashTimer   = 0;

  // Build fresh level data (DEFS[] always returns a new object)
  const defFn = DEFS[Math.min(lv, 10)] || DEFS[10];
  lvData = defFn();

  // Make sure every moving entity has a clean timer
  lvData.platforms.forEach(pl => {
    if (pl.type === 'moving') { pl.t = 0; if (pl.ox===undefined) pl.ox=pl.x; if (pl.oy===undefined) pl.oy=pl.y; }
  });
  lvData.obstacles.forEach(ob => {
    if (ob.type === 'moving') { ob.t = 0; if (ob.ox===undefined) ob.ox=ob.x; }
  });

  // Clear all per-run arrays
  currentRec = [];
  particles  = [];

  // Player — clean spawn
  resetPlayer();

  // Camera — hard reset to world origin
  camX       = 0;
  targetCamX = 0;

  // Ghosts
  initGhosts();

  updateHUD();
}

// ════════════════════════════════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════════════════════════════════
const keys  = {};
const touch = { left:false, right:false, jump:false, dash:false };
let jumpPressed = false, dashPressed = false;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','KeyW'].includes(e.code) && !jumpPressed) jumpPressed = true;
  if (['ShiftLeft','ShiftRight'].includes(e.code)) dashPressed = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','ShiftLeft','ShiftRight'].includes(e.code))
    e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function bindBtn(id, prop) {
  const el = document.getElementById(id);
  if (!el) return;
  const on  = e => { e.preventDefault(); touch[prop]=true;  el.classList.add('pressed'); };
  const off = e => { e.preventDefault(); touch[prop]=false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart',  on,  {passive:false});
  el.addEventListener('touchend',    off, {passive:false});
  el.addEventListener('touchcancel', off, {passive:false});
  // Mouse fallback for testing on desktop
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup',   off);
}
bindBtn('tLeft','left'); bindBtn('tRight','right');
bindBtn('tJump','jump'); bindBtn('tDash','dash');

// Tap on canvas = jump (for mobile)
canvas.addEventListener('touchstart', e => {
  if (e.target === canvas) { e.preventDefault(); jumpPressed = true; }
}, {passive:false});

const iL = () => keys['KeyA']||keys['ArrowLeft'] ||touch.left;
const iR = () => keys['KeyD']||keys['ArrowRight']||touch.right;
const iJ = () => keys['Space']||keys['ArrowUp']||keys['KeyW']||touch.jump;

// ════════════════════════════════════════════════════════════════════════
//  COLLISION
// ════════════════════════════════════════════════════════════════════════
function overlap(a,b) {
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

function resolvePlatforms() {
  p.onGround = false;
  for (const pl of lvData.platforms) {
    if (!overlap(p,pl)) continue;
    const ox = Math.min(p.x+p.w,pl.x+pl.w)-Math.max(p.x,pl.x);
    const oy = Math.min(p.y+p.h,pl.y+pl.h)-Math.max(p.y,pl.y);
    if (oy < ox) {
      if (p.y+p.h*0.5 < pl.y+pl.h*0.5) { p.y=pl.y-p.h; p.vy=0; p.onGround=true; }
      else { p.y=pl.y+pl.h; p.vy=Math.max(p.vy,0); }
    } else {
      if (p.x+p.w*0.5 < pl.x+pl.w*0.5) p.x=pl.x-p.w; else p.x=pl.x+pl.w;
      p.vx=0;
    }
  }
}

// ════════════════════════════════════════════════════════════════════════
//  PARTICLES
// ════════════════════════════════════════════════════════════════════════
function burst(x,y,color,n,spd) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, sp=spd*(0.4+Math.random()*0.6);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,
      life:1, decay:0.03+Math.random()*0.04, r:2+Math.random()*3, color});
  }
}

// ════════════════════════════════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════════════════════════════════
function update() {
  if (state === 'transitioning') { updateTransition(); return; }
  if (state !== 'playing') return;

  frameCount++;
  levelTimer++;
  score = Math.floor(levelTimer/60) + (level-1)*60;
  if (score > bestScore) { bestScore=score; localStorage.setItem('sr_best',bestScore); }

  // Animate movers
  for (const pl of lvData.platforms) {
    if (pl.type!=='moving') continue;
    pl.t++;
    pl.x = pl.ox + Math.sin(pl.t * pl.vx * 0.04) * pl.range;
  }
  for (const ob of lvData.obstacles) {
    if (ob.type!=='moving') continue;
    ob.t++;
    ob.x = ob.ox + Math.sin(ob.t * ob.vx * 0.04) * ob.range;
  }

  if (!p.dead) {
    if (invincTimer  > 0) invincTimer--;
    if (dashCooldown > 0) dashCooldown--;

    if (p.dashing) {
      p.dashTimer--;
      p.vx = p.dashDir * DASH_SPD;
      p.vy *= 0.88;
      if (p.dashTimer <= 0) p.dashing = false;
    } else {
      if (iL()) { p.vx -= ACCEL; p.dashDir = -1; }
      if (iR()) { p.vx += ACCEL; p.dashDir =  1; }
      p.vx *= FRIC;
      p.vx  = Math.max(-MAX_SPD, Math.min(MAX_SPD, p.vx));

      if ((iJ() || jumpPressed) && p.onGround) {
        p.vy=JUMP_V; p.onGround=false; sfxJump();
      }
      if ((dashPressed || touch.dash) && dashUnlocked && dashCooldown<=0) {
        p.dashing=true; p.dashTimer=DASH_DUR;
        p.vy=Math.min(p.vy,-2); dashCooldown=40; sfxDash();
      }

      p.vy += GRAVITY;
      if (p.vy>18) p.vy=18;
    }

    jumpPressed=false; dashPressed=false;

    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) { p.x=0; p.vx=0; }

    resolvePlatforms();

    // ── GOAL CHECK (world-space comparison — no camX subtraction) ──
    if (lvData.goalX && p.x >= lvData.goalX) {
      beginTransition();
      return;
    }

    // Kill zone
    if (p.y > H + 80) { playerDie(p.x, H); return; }

    // Obstacle hits
    if (invincTimer <= 0) {
      for (const ob of lvData.obstacles) {
        if (overlap(p,ob)) { playerHit(); break; }
      }
    }

    // Trail
    p.trail.push({x:p.x+p.w/2, y:p.y+p.h/2});
    if (p.trail.length>8) p.trail.shift();

    // Ghost recording
    if (currentRec.length < MAX_REC) currentRec.push({x:p.x, y:p.y});
  }

  // Advance ghosts
  for (const g of ghosts) {
    g.frameIdx++;
    if (g.frameIdx < g.frames.length) {
      g.x = g.frames[g.frameIdx].x;
      g.y = g.frames[g.frameIdx].y;
    }
    if (invincTimer<=0 && !p.dead) {
      if (overlap({x:g.x-2,y:g.y-2,w:26,h:32},{x:p.x,y:p.y,w:p.w,h:p.h})) playerHit();
    }
  }

  // Particles
  for (let i=particles.length-1;i>=0;i--) {
    const pt=particles[i];
    pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.15;
    pt.life-=pt.decay;
    if (pt.life<=0) particles.splice(i,1);
  }

  // Camera
  targetCamX = Math.max(0, p.x - W*0.35);
  camX += (targetCamX - camX) * 0.1;
  if (shakeTimer>0) shakeTimer--;

  updateHUD();
}

// ════════════════════════════════════════════════════════════════════════
//  LEVEL TRANSITION  (fade-out → swap level → fade-in)
// ════════════════════════════════════════════════════════════════════════
const overlayEl = document.getElementById('levelOverlay');
const bannerEl  = document.getElementById('levelBanner');

function beginTransition() {
  if (state==='transitioning') return;
  sfxLevel();
  burst(p.x+p.w/2, p.y+p.h/2, '#00d4ff', 18, 6);
  saveGhost();
  transNextLv = level + 1;
  if (transNextLv > 10) diffMod = Math.min(diffMod+0.15, 3.0);
  transAlpha = 0;
  transPhase = 'out';
  state = 'transitioning';
}

function updateTransition() {
  if (transPhase === 'out') {
    transAlpha = Math.min(1, transAlpha + FADE);
    overlayEl.style.opacity = transAlpha;
    if (transAlpha >= 1) {
      // Level fully hidden — swap all state safely here
      startLevel(transNextLv);
      showBanner(transNextLv);
      transPhase = 'in';
    }
  } else if (transPhase === 'in') {
    transAlpha = Math.max(0, transAlpha - FADE * 0.65);
    overlayEl.style.opacity = transAlpha;
    if (transAlpha <= 0) {
      overlayEl.style.opacity = 0;
      transPhase = '';
      state = 'playing';
    }
  }
}

function showBanner(lv) {
  bannerEl.textContent = lv > 10 ? 'ENDLESS MODE' : `LEVEL  ${lv}`;
  bannerEl.style.opacity = '1';
  setTimeout(() => { bannerEl.style.opacity = '0'; }, 1500);
}

// ════════════════════════════════════════════════════════════════════════
//  HIT / DEATH
// ════════════════════════════════════════════════════════════════════════
function playerHit() {
  if (invincTimer>0||p.dead) return;
  p.hp--;
  invincTimer=80; shakeTimer=12; flashTimer=10;
  sfxHit();
  burst(p.x+p.w/2, p.y+p.h/2, '#ff4466', 10, 5);
  if (p.hp<=0) playerDie(p.x, p.y);
  updateHUD();
}

function playerDie(wx, wy) {
  if (p.dead) return;
  p.dead=true; sfxDeath(); shakeTimer=20;
  burst(p.x+p.w/2, p.y+p.h/2, '#ff4466', 22, 7);

  deathLocs.push(wx);
  if (deathLocs.length>30) deathLocs.shift();
  localStorage.setItem('sr_deaths', JSON.stringify(deathLocs));

  saveGhost();
  if (score>bestScore) { bestScore=score; localStorage.setItem('sr_best',bestScore); }
  totalRuns++;
  localStorage.setItem('sr_runs', totalRuns);

  setTimeout(showDead, 950);
}

function showDead() {
  state='dead';
  document.getElementById('gameOverScreen').classList.remove('hidden');
  document.getElementById('goLevel').textContent = level;
  document.getElementById('goScore').textContent = score;
  document.getElementById('goBest').textContent  = bestScore;
  const msgs=[
    'Your ghost will haunt the next run.',
    'The shadows remember every mistake.',
    'Try again — you know the pattern now.',
    'Failure is data. Adapt.',
    'Your echo will face you next time.',
    'The run is over. The ghost persists.',
  ];
  document.getElementById('goMsg').textContent = msgs[Math.floor(Math.random()*msgs.length)];
}

// ════════════════════════════════════════════════════════════════════════
//  HUD
// ════════════════════════════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('hudLevel').textContent = level;
  document.getElementById('hudScore').textContent = score;
  document.getElementById('hudBest').textContent  = bestScore;
  const hp   = Math.max(0, p.hp||0);
  const hpEl = document.getElementById('hudHP');
  hpEl.textContent = '■'.repeat(hp)+'□'.repeat(Math.max(0,3-hp));
  hpEl.className   = 'hud-val'+(hp<=1?' danger':'');
}

// ════════════════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════════════════
function drawBg() {
  gC.fillStyle='#08080f';
  gC.fillRect(0,0,W,H);
  // Stars (parallax)
  gC.fillStyle='rgba(110,110,190,0.5)';
  for (let i=0;i<44;i++) {
    const sx=((i*73+camX*0.12)%W+W)%W;
    const sy=(i*37)%(H*0.72);
    const sz=0.5+(i%3)*0.5;
    gC.fillRect(sx,sy,sz,sz);
  }
  // Silhouette mountains
  gC.fillStyle='rgba(18,18,46,0.8)';
  for (let i=0;i<8;i++) {
    const mx=((i*220-camX*0.22)%(W+200)+W+200)%(W+200)-100;
    const mh=60+(i%3)*40;
    gC.beginPath(); gC.moveTo(mx,H-60); gC.lineTo(mx+80,H-60-mh); gC.lineTo(mx+160,H-60); gC.closePath(); gC.fill();
  }
  gC.fillStyle='rgba(0,40,80,0.07)';
  gC.fillRect(0,380,W,120);
}

function drawGoal(gx) {
  const sx=gx-camX;
  if (sx<-60||sx>W+60) return;
  gC.save();
  const hue=(Date.now()/8)%360;
  gC.strokeStyle=`hsl(${hue},80%,65%)`;
  gC.lineWidth=2.5;
  gC.shadowColor=gC.strokeStyle; gC.shadowBlur=14;
  for (let y=40;y<H-40;y+=28) {
    gC.beginPath(); gC.moveTo(sx,y); gC.lineTo(sx,y+18); gC.stroke();
  }
  gC.font='10px Courier New';
  gC.fillStyle=gC.strokeStyle;
  gC.fillText('GOAL',sx-14,30);
  gC.restore();
}

function drawPlatform(pl) {
  const sx=pl.x-camX;
  if (sx+pl.w<-2||sx>W+2) return;
  const pal={
    solid: {body:'#1e1e3a',top:'#4848a0'},
    safe:  {body:'#0c2e18',top:'#22cc60'},
    moving:{body:'#1e1a08',top:'#ddaa22'},
  };
  const c=pal[pl.type]||pal.solid;
  gC.fillStyle=c.body; gC.fillRect(sx,pl.y,pl.w,pl.h);
  gC.fillStyle=c.top;  gC.fillRect(sx,pl.y,pl.w,3);
  if (pl.type==='safe'&&pl.h<30) {
    gC.fillStyle='rgba(28,200,80,0.05)';
    gC.fillRect(sx,pl.y-70,pl.w,70);
  }
}

function drawSpike(ob) {
  const sx=ob.x-camX;
  if (sx+ob.w<0||sx>W) return;
  const mid=sx+ob.w/2;
  gC.fillStyle='#c02040';
  gC.beginPath(); gC.moveTo(mid,ob.y); gC.lineTo(sx+ob.w,ob.y+ob.h); gC.lineTo(sx,ob.y+ob.h); gC.closePath(); gC.fill();
  gC.fillStyle='rgba(255,60,90,0.5)';
  gC.beginPath(); gC.moveTo(mid,ob.y-1); gC.lineTo(mid+3,ob.y+5); gC.lineTo(mid,ob.y+4); gC.closePath(); gC.fill();
}

function drawMovingBlock(ob) {
  const sx=ob.x-camX;
  if (sx+ob.w<0||sx>W) return;
  gC.fillStyle='#9a2000'; gC.fillRect(sx,ob.y,ob.w,ob.h);
  gC.fillStyle='#ff4422'; gC.fillRect(sx+2,ob.y+2,ob.w-4,4);
  gC.fillRect(sx+2,ob.y+ob.h-6,ob.w-4,4);
}

function drawPlayer() {
  if (p.dead) return;
  const sx=p.x-camX;
  // Trail
  for (let i=0;i<p.trail.length;i++) {
    const a=(i/p.trail.length)*0.22, r=(i/p.trail.length)*5;
    gC.globalAlpha=a; gC.fillStyle='#00d4ff';
    gC.fillRect(p.trail[i].x-camX-r/2, p.trail[i].y-r/2, r, r);
  }
  gC.globalAlpha=1;
  if (invincTimer>0&&Math.floor(invincTimer/6)%2===0) return;
  gC.shadowColor='#00d4ff'; gC.shadowBlur=12;
  if (p.dashing) {
    gC.globalAlpha=0.28; gC.fillStyle='#00d4ff';
    gC.fillRect(sx-p.dashDir*22,p.y,p.w,p.h);
    gC.globalAlpha=1;
  }
  gC.fillStyle='#00d4ff'; gC.fillRect(sx,p.y,p.w,p.h);
  const ex=sx+(p.dashDir>0?13:4);
  gC.fillStyle='#061018';
  gC.fillRect(ex,p.y+6,5,5);
  gC.fillRect(ex,p.y+15,5,2);
  gC.shadowBlur=0;
}

function drawGhost(g) {
  if (g.frameIdx>=g.frames.length) return;
  const sx=g.x-camX;
  if (sx<-50||sx>W+50) return;
  gC.save();
  gC.globalAlpha=g.alpha;
  gC.shadowColor='#cc66ff'; gC.shadowBlur=14;
  gC.fillStyle='#cc66ff'; gC.fillRect(sx,g.y,22,28);
  gC.globalAlpha=g.alpha*0.28;
  gC.fillStyle='#ff80ff'; gC.fillRect(sx-3,g.y-3,28,34);
  gC.restore();
}

function drawParticles() {
  for (const pt of particles) {
    gC.globalAlpha=pt.life; gC.fillStyle=pt.color;
    gC.fillRect(pt.x-camX-pt.r/2, pt.y-pt.r/2, pt.r, pt.r);
  }
  gC.globalAlpha=1;
}

function drawFlash() {
  if (flashTimer>0) {
    flashTimer--;
    gC.fillStyle=`rgba(255,40,50,${(flashTimer/10)*0.35})`;
    gC.fillRect(0,0,W,H);
  }
}

function drawDashBar() {
  if (!dashUnlocked) return;
  const bx=W-64, by=28, bw=50, bh=3;
  gC.fillStyle='rgba(0,50,80,0.6)';
  gC.fillRect(bx,by,bw,bh);
  const fill = dashCooldown<=0 ? bw : bw*(1-dashCooldown/40);
  gC.fillStyle = dashCooldown<=0 ? '#00d4ff' : '#336688';
  gC.fillRect(bx,by,fill,bh);
  gC.fillStyle = dashCooldown<=0 ? 'rgba(0,212,255,0.7)' : 'rgba(80,100,140,0.5)';
  gC.font='8px Courier New';
  gC.fillText('DASH',bx,by-3);
}

function drawProgressBar() {
  if (!lvData||!lvData.goalX) return;
  const prog=Math.min(1, p.x/lvData.goalX);
  gC.fillStyle='rgba(0,40,60,0.6)'; gC.fillRect(0,H-3,W,3);
  gC.fillStyle='#00d4ff';           gC.fillRect(0,H-3,W*prog,3);
}

function render() {
  gC.clearRect(0,0,W,H);

  if (state==='start'||state==='dead') {
    gC.fillStyle='#08080f'; gC.fillRect(0,0,W,H);
    return;
  }

  let shX=0, shY=0;
  if (shakeTimer>0) {
    shX=(Math.random()-0.5)*7*(shakeTimer/20);
    shY=(Math.random()-0.5)*4*(shakeTimer/20);
  }
  gC.save();
  gC.translate(shX,shY);

  drawBg();
  for (const pl of lvData.platforms) drawPlatform(pl);
  if (lvData.goalX) drawGoal(lvData.goalX);
  for (const ob of lvData.obstacles) {
    if      (ob.type==='spike')  drawSpike(ob);
    else if (ob.type==='moving') drawMovingBlock(ob);
  }
  for (const g of ghosts) drawGhost(g);
  drawPlayer();
  drawParticles();
  drawFlash();
  drawDashBar();
  drawProgressBar();

  gC.restore();
}

// ════════════════════════════════════════════════════════════════════════
//  GAME LOOP
// ════════════════════════════════════════════════════════════════════════
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════════════════════════
//  UI WIRING
// ════════════════════════════════════════════════════════════════════════
function refreshStart() {
  document.getElementById('startBest').textContent = bestScore;
  document.getElementById('startRuns').textContent = totalRuns;
}

function launchGame() {
  initAudio();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  overlayEl.style.opacity = 0;
  transPhase = '';
  transAlpha = 0;
  diffMod = 1.0 + Math.min(totalRuns*0.04, 1.0);
  state   = 'playing';
  startLevel(1);
  showBanner(1);
}

document.getElementById('startBtn').addEventListener('click', () => { refreshStart(); launchGame(); });
document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('gameOverScreen').classList.add('hidden');
  overlayEl.style.opacity = 0;
  transPhase = ''; transAlpha = 0;
  diffMod = 1.0 + Math.min(totalRuns*0.04, 1.0);
  state   = 'playing';
  startLevel(1);
  showBanner(1);
  refreshStart();
});

document.addEventListener('keydown', e => {
  if (e.code==='Enter'||e.code==='NumpadEnter') {
    if      (state==='start') { refreshStart(); launchGame(); }
    else if (state==='dead')  document.getElementById('restartBtn').click();
  }
});

// ── Boot ──────────────────────────────────────────────────────────────
refreshStart();
loop();
</script>
